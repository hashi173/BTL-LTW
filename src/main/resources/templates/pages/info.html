<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">

<head>
    <title>Info & Contact - The Coffee House</title>
</head>

<body>
    <div th:fragment="content">
        <div class="container py-5 mt-5">
            <div class="row g-5">
                <!-- Info Column -->
                <div class="col-lg-5">
                    <h2 class="fw-bold mb-4"
                        th:text="#{info.contact}">Contact Information</h2>
                    <div class="d-flex mb-4">
                        <div class="flex-shrink-0 text-primary">
                            <i class="fas fa-map-marker-alt fa-2x"></i>
                        </div>
                        <div class="ms-3">
                            <h5 class="fw-bold" th:text="#{info.headquarters}">Headquarters</h5>
                            <p class="text-muted" th:utext="#{info.address}">123 Coffee Street, District 1<br>Ho Chi
                                Minh City, Vietnam</p>
                        </div>
                    </div>

                    <div class="d-flex mb-4">
                        <div class="flex-shrink-0 text-primary">
                            <i class="fas fa-phone-alt fa-2x"></i>
                        </div>
                        <div class="ms-3">
                            <h5 class="fw-bold" th:text="#{info.phone}">Phone</h5>
                            <p class="text-muted">+84 90 123 4567<br><span th:text="#{info.phone.hours}">Mon-Fri, 9am -
                                    6pm</span></p>
                        </div>
                    </div>

                    <div class="d-flex mb-4">
                        <div class="flex-shrink-0 text-primary">
                            <i class="fas fa-envelope fa-2x"></i>
                        </div>
                        <div class="ms-3">
                            <h5 class="fw-bold" th:text="#{info.email}">Email</h5>
                            <p class="text-muted">hello@coffeehouse.com<br>support@coffeehouse.com</p>
                        </div>
                    </div>

                    <hr class="my-5">

                    <h2 class="fw-bold mb-4" th:text="#{info.hours}">Opening Hours</h2>
                    <ul class="list-unstyled">
                        <li class="d-flex justify-content-between mb-2">
                            <span th:text="#{info.weekday}">Monday - Friday</span>
                            <span class="fw-bold" th:text="#{info.weekday.hours}">7:00 AM - 10:00 PM</span>
                        </li>
                        <li class="d-flex justify-content-between mb-2">
                            <span th:text="#{info.weekend}">Saturday - Sunday</span>
                            <span class="fw-bold" th:text="#{info.weekend.hours}">8:00 AM - 11:00 PM</span>
                        </li>
                    </ul>
                </div>

                <!-- Map/Form Column -->
                <div class="col-lg-7">
                    <div class="card border-0 shadow-lg rounded-4 overflow-hidden h-100">
                        <!-- Google Maps Embed -->
                        <div class="bg-light" style="height: 100%;">
                            <iframe
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.4241686469647!2d106.69842531535616!3d10.778786262100877!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752f385570472f%3A0x1787491df961e0f1!2sIndependence%20Palace!5e0!3m2!1sen!2s!4v1645431682703!5m2!1sen!2s"
                                width="100%" height="100%" style="border:0; min-height: 500px;" allowfullscreen="" loading="lazy"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
