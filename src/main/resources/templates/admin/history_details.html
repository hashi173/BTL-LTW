<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">

<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <a href="/admin/history" class="text-decoration-none text-dark"><i
                        class="fas fa-arrow-left me-2"></i></a>
                Details for <span th:text="${monthName + ' ' + year}">January 2025</span>
            </h2>
        </div>

        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card text-white bg-success h-100">
                    <div class="card-body">
                        <h6 class="card-title">Total Revenue</h6>
                        <p class="card-text fs-3 fw-bold"
                            th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 mb-4">
                <div class="card shadow h-100">
                    <div class="card-header bg-white">
                        <h5 class="mb-0 text-primary">Orders (Completed)</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>#Order</th>
                                    <th>Time</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="order : ${orders}">
                                    <td>
                                        <span class="fw-bold" th:text="${order.trackingCode}">ORD-123</span>
                                        <div class="small text-muted" th:if="${order.customerName}"
                                            th:text="${order.customerName}">Name</div>
                                    </td>
                                    <td th:text="${#temporals.format(order.createdAt, 'dd-MM HH:mm')}">01-01 12:00</td>
                                    <td class="fw-bold text-end pe-4"
                                        th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                                        50,000 VND</td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(orders)}">
                                    <td colspan="3" class="text-center py-3 text-muted">No orders found.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <div
                            th:replace="~{admin/fragments/pagination :: pagination(${currentPage}, ${totalPages}, ${detailsBaseUrl}, '', 'page')}">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
