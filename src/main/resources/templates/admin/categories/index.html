<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">

<body>
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Category Management</h2>
            <a href="/admin/categories/new" class="btn btn-primary shadow-sm"><i class="fas fa-plus me-2"></i> Add New Category</a>
        </div>

        <div th:if="${message}" class="alert alert-success shadow-sm" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger shadow-sm" th:text="${error}"></div>

        <div class="card shadow-sm mb-4 border-0">
            <div class="card-body py-3">
                <form action="/admin/categories" method="get" class="row g-2 align-items-center">
                    <div class="col-auto">
                        <label class="col-form-label fw-bold">Search:</label>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="search" class="form-control" placeholder="Search by name or code..."
                            th:value="${search}">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i></button>
                        <a href="/admin/categories" class="btn btn-outline-secondary" title="Clear"><i
                                class="fas fa-times"></i></a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm border-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Code</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td class="ps-4 fw-bold text-primary" th:text="${cat.displayCode}">CAT-COFFEE</td>
                            <td class="fw-bold text-primary" th:text="${cat.name}">Coffee</td>
                            <td th:text="${cat.description}">Delicious Coffee</td>
                            <td class="text-end pe-4">
                                <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                    class="btn btn-sm btn-outline-info me-1" title="Edit"><i class="fas fa-edit"></i></a>
                                <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}"
                                    class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete category?')" title="Delete"><i
                                        class="fas fa-trash"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="4" class="text-center py-5 text-muted">No categories found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4"
            th:replace="~{admin/fragments/pagination :: pagination(${currentPage}, ${totalPages}, '/admin/categories', ${search}, 'page')}">
        </div>
    </div>
</body>

</html>
